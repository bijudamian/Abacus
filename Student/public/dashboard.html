<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abacus Quiz Dashboard</title>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        body {
    display: flex;
    margin: 0;
    font-family: 'Roboto', sans-serif;
    flex-direction: column;
    overflow-x: hidden;
    overflow-y: auto; /* Enable vertical scrolling */
    background: #f5f5f5;
    font-size: 16px; /* Increase the font size */
}

        .sidebar {
            width: 250px;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            color: white;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            position: fixed;
            left: -250px; /* Hidden initially */
            top: 0;
            transition: left 0.3s ease-out;
            z-index: 1000;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        }

        .sidebar h2 {
            margin: 0 0 20px 0;
            font-size: 1.5em;
            color: #333;
        }

        .sidebar a {
            color: #333;
            text-decoration: none;
            display: block;
            margin: 15px 0;
            padding: 10px 15px;
            background: white;
            border-radius: 5px;
            transition: background 0.3s, transform 0.3s;
        }

        .sidebar a:hover {
            background: #dcdcdc;
            transform: translateX(10px);
        }

        .menu-button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: #333;
            position: absolute;
            left: 10px; /* Positioned next to the sidebar */
            top: 20px;
            z-index: 1001; /* Above the sidebar */
            transition: left 0.3s ease-out;
        }

        .main-content {
            margin-left: 0;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            animation: fadeIn 1s ease-in;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logout-button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            display: block;
            transition: background 0.3s;
            border-radius: 5px;
        }

        .logout-button:hover {
            background: #cc0000;
        }

        .colorful-heading {
            font-size: 2.5em;
            background: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet);
            -webkit-background-clip: text;
            color: transparent;
            animation: fadeIn 2s ease-in;
            margin-bottom: 20px;
        }

        .score-container {
            margin-top: 20px;
            padding: 20px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 6000px;
            animation: fadeIn 2s ease-in;
            text-align: center;
        }

        .score-container.hidden {
            display: none;
        }

        .performance-container {
    display: none;
    background-color: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    width: 90%;
    max-width: 800px;
    margin: 20px auto;
    overflow-y: auto; /* Enable vertical scrolling within the container */
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1000;
    max-height: 90vh; /* Ensure it doesn't exceed the viewport height */
}

.performance-container button {
    border-radius: 2px;
}

.back-to-dashboard {
    margin-top: 20px;
    background: #007BFF;
    color: white;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 5px;
    transition: background 0.3s;
}

.back-to-dashboard:hover {
    background: #0056b3;
}




        @media screen and (max-width: 768px) {
            .sidebar {
                height: 100vh;
            }

            .main-content {
                padding: 10px;
                width: 100%;
            }

            .score-container {
                width: 100%;
            }
        }

        @media screen and (max-width: 480px) {
            .sidebar a {
                margin: 10px 0;
            }

            .main-content {
                padding: 10px;
                width: 100%;
            }

            .score-container {
                padding: 10px;
                width: 100%;
            }
        }
        #quiz-levels{
            display: flex;
        }
    </style>
</head>
<body>
    <button class="menu-button" id="menu-button">&#9776;</button>
    <div class="sidebar" id="sidebar">
        <h2><b>Exams</b></h2>
    </div>
    <br><br>

    <div class="main-content">
        <div class="header">
            <br><br>
            <h1 id="greeting">Welcome!</h1>
            <button id="logout-button" class="logout-button" type="button">Logout</button>
        </div>
        <div id="quiz-levels" class="quiz-levels"></div>
    </div>
    <script type="module">
        // Import Firebase and necessary functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCoo1UZt6daTqU1BRmTJoxJN601KNhvf4c",
            authDomain: "abacus-1cd92.firebaseapp.com",
            projectId: "abacus-1cd92",
            storageBucket: "abacus-1cd92.appspot.com",
            messagingSenderId: "52069573106",
            appId: "1:52069573106:web:224d42e32e098446a34b6b",
            measurementId: "G-NCZPLYG1NR"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Listen for authentication state changes
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const email = user.email;
                const userName = capitalizeFirstLetter(email.substring(0, email.indexOf('@')));
                localStorage.setItem('userName', userName);
                document.getElementById('greeting').textContent = `Welcome, ${userName}`;
                document.getElementById('logout-button').style.display = 'block';

                // Fetch and display scores
                await fetchAndDisplayScores(userName);
            } else {
                document.getElementById('greeting').textContent = 'Welcome!';
                document.getElementById('logout-button').style.display = 'none';
            }
        });

        const capitalizeFirstLetter = (string) => {
            return string.charAt(0).toUpperCase() + string.slice(1);
        };

        const fetchAndDisplayPerformance = async (level, container) => {
            const userName = localStorage.getItem('userName');
            if (userName) {
                const scoreRef = collection(db, 'scores');
                const userDocRef = doc(scoreRef, userName);
                const docSnapshot = await getDoc(userDocRef);

                if (docSnapshot.exists() && docSnapshot.data()[`level${level}`]) {
                    const resultHTML = generateResultHTML(docSnapshot.data()[`level${level}`].results);
                    container.innerHTML = resultHTML;
                }
            }
        };

        const generateResultHTML = (results) => {
    return results.map((result, i) => `
        <div style="background-color: white; color: black; padding: 20px;">
            <h3>Question ${i + 1}</h3>
            <p>${result.question}</p>
            ${result.options.map((option, idx) => `
                <button style="background-color: ${
                    result.userAnswer === idx ? (result.correct ? 'green' : 'red') : 'grey'
                }; border-radius: 2px;">
                    ${option}
                </button>
            `).join('')}
            <p>Correct answer: ${result.answer}</p>
            <hr>
        </div>
    `).join('') + '<a href="dashboard.html"><button class="back-to-dashboard">Back to Dashboard</button></a>';
};


        const showPerformanceContainer = (container) => {
    container.style.display = 'block';
};

const goToDashboard = () => {
    document.querySelector('.performance-container').style.display = 'none';
};

        const fetchAndDisplayScores = async (userName) => {
            try {
                const scoreRef = collection(db, 'scores');
                const userDocRef = doc(scoreRef, userName);
                const docSnapshot = await getDoc(userDocRef);
                const levelsContainer = document.querySelector('.quiz-levels');

                if (docSnapshot.exists()) {
                    const scoreData = docSnapshot.data();
                    levelsContainer.innerHTML = ''; // Clear existing content
                    for (const [key, value] of Object.entries(scoreData)) {
                        const level = key.replace('level', '');
                        const levelElement = document.createElement('div');
                        levelElement.className = 'score-container';
                        levelElement.id = `level-${level}-score`;
                        levelElement.innerHTML = `
                            <h2>Abacus Level ${level}</h2>
                            <p>Latest Score: ${value.score} / ${value.maxScore}</p>
                            <button id="view-performance-button" class="view-performance-button" type="button">View Your Performance</button>
                            <div id="performance-container" class="performance-container"></div>
                        `;
                        levelsContainer.appendChild(levelElement);
                    }
                }
            } catch (error) {
                console.error('Error fetching user scores:', error);
            }
        };

        // Logout function
        const logout = () => {
            signOut(auth).then(() => {
                console.log('User signed out.');
                window.location.href = 'index.html';
            }).catch((error) => {
                console.error('Sign out error', error);
            });
        };

        // Add event listener to the logout button
        document.getElementById('logout-button').addEventListener('click', logout);

        // Add event listener to the menu button for sidebar toggling
        document.getElementById('menu-button').addEventListener('click', function () {
            var sidebar = document.getElementById('sidebar');
            var menuButton = document.getElementById('menu-button');
            if (sidebar.style.left === '0px') {
                sidebar.style.left = '-250px'; // Hide the sidebar
                menuButton.style.left = '10px'; // Move the button to the edge of the screen
            } else {
                sidebar.style.left = '0px'; // Show the sidebar
                menuButton.style.left = '260px'; // Move the button next to the sidebar
            }
        });

        // Fetch quizzes from Firestore and update sidebar
        const fetchQuizzes = async () => {
            const sidebar = document.getElementById('sidebar');
            const levelsContainer = document.querySelector('.quiz-levels');

            try {
                const quizRef = collection(db, 'Quizzes');
                const quizSnapshot = await getDocs(quizRef);
                sidebar.innerHTML = '<h2><b>Exams</b></h2>'; // Clear existing content
                let index = 1;

                quizSnapshot.forEach((doc) => {
                    const quizData = doc.data();
                    const quizLink = document.createElement('a');
                    quizLink.href = quizData.url;
                    quizLink.textContent = `Abacus Level ${index}`;
                    sidebar.appendChild(quizLink);

                    // Create corresponding score containers
                    const levelElement = document.createElement('div');
                    levelElement.className = 'score-container hidden';
                    levelElement.id = `level-${index}-score`;
                    levelElement.innerHTML = `
                        <h2>Abacus Level ${index}</h2>
                        <p>Latest Score: No score available</p>
                    `;
                    levelsContainer.appendChild(levelElement);

                    index++;
                });
            } catch (error) {
                console.error('Error fetching quizzes:', error);
            }
        };

        // Initialize quizzes on load
        fetchQuizzes();

        // Add this near the end of your script section
        document.addEventListener('click', async (event) => {
            if (event.target && event.target.classList.contains('view-performance-button')) {
                const levelElement = event.target.closest('.score-container');
                const performanceContainer = levelElement.querySelector('.performance-container');
                const level = levelElement.id.split('-')[1];

                // Fetch and display performance for this level
                await fetchAndDisplayPerformance(level, performanceContainer);
                showPerformanceContainer(performanceContainer);
            }
        });

    </script>
</body>
</html>
