<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abacus Quiz — Level 2</title>
    <link rel="stylesheet" href="quiz.css?v=3.0">
</head>
<body>
    <div class="countdown-overlay" id="countdown-overlay">
        <div class="countdown-container">
            <h1 id="countdown">3</h1>
        </div>
    </div>

    <!-- Mobile nav toggle -->
    <button class="nav-toggle-mobile" id="navToggle" type="button">📋 Questions</button>

    <div class="quiz-layout" id="quizLayout">
        <!-- Question Navigator -->
        <div class="quiz-navigator" id="quizNav">
            <div class="nav-title">Questions</div>
            <div class="nav-grid" id="navGrid"></div>
            <div class="nav-legend">
                <div class="legend-item"><span class="legend-dot current-dot"></span> Current</div>
                <div class="legend-item"><span class="legend-dot answered-dot"></span> Answered</div>
                <div class="legend-item"><span class="legend-dot skipped-dot"></span> Skipped</div>
                <div class="legend-item"><span class="legend-dot unanswered-dot"></span> Not visited</div>
            </div>
        </div>

        <!-- Main Quiz Area -->
        <div class="quiz-container" id="quiz">
            <div id="timer">Time: <span id="time">00:00:00</span></div>
            <div class="progress-bar-container"><div class="progress-bar-fill" id="progressBar"></div></div>
            <div class="quiz-header">
                <h2 id="question">Question text</h2>
                <ul>
                    <li><input type="radio" id="a" name="answer" class="answer"/><label id="a_text" for="a">Option</label></li>
                    <li><input type="radio" id="b" name="answer" class="answer"/><label id="b_text" for="b">Option</label></li>
                    <li><input type="radio" id="c" name="answer" class="answer"/><label id="c_text" for="c">Option</label></li>
                </ul>
            </div>
            <div class="quiz-buttons">
                <button id="previous" style="display:none;">Previous</button>
                <button id="skip-btn" type="button">Skip</button>
                <button id="next">Next</button>
                <button id="submit" style="display:none;">Submit</button>
            </div>
        </div>
    </div>

    <!-- Skip warning modal -->
    <div class="skip-warning-backdrop" id="skipWarning">
        <div class="skip-warning-modal">
            <h3>⚠️ Unanswered Questions</h3>
            <p id="skipWarningText">You have unanswered questions. Submit anyway?</p>
            <div class="skip-warning-actions">
                <button class="btn-review" id="btnReview" type="button">Review</button>
                <button class="btn-submit-anyway" id="btnSubmitAnyway" type="button">Submit Anyway</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDoc, doc, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {firebaseConfig} from './firebaseConfig.js';
import {quizData} from './quiz2data.js';

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.addEventListener('contextmenu', e => e.preventDefault());

// DOM refs
const quiz = document.getElementById("quiz");
const answerEls = document.querySelectorAll(".answer");
const questionEl = document.getElementById("question");
const optionA = document.getElementById("a_text");
const optionB = document.getElementById("b_text");
const optionC = document.getElementById("c_text");
const timeEl = document.getElementById("time");
const countdownOverlay = document.getElementById("countdown-overlay");
const countdownEl = document.getElementById("countdown");
const previousBtn = document.getElementById("previous");
const nextBtn = document.getElementById("next");
const submitBtn = document.getElementById("submit");
const skipBtn = document.getElementById("skip-btn");
const navGrid = document.getElementById("navGrid");
const progressBar = document.getElementById("progressBar");
const skipWarning = document.getElementById("skipWarning");
const skipWarningText = document.getElementById("skipWarningText");
const navToggle = document.getElementById("navToggle");
const quizNav = document.getElementById("quizNav");

let currentQuiz = 0;
let time = 0;
let timer;
let userAnswers = Array(quizData.length).fill(null);
let visited = new Set(); // tracks which questions user has seen

// --- Build navigator dots ---
function buildNavigator() {
    navGrid.innerHTML = '';
    quizData.forEach((_, i) => {
        const dot = document.createElement('button');
        dot.className = 'nav-dot';
        dot.textContent = i + 1;
        dot.type = 'button';
        dot.addEventListener('click', () => goToQuestion(i));
        navGrid.appendChild(dot);
    });
}

function updateNavigator() {
    const dots = navGrid.querySelectorAll('.nav-dot');
    dots.forEach((dot, i) => {
        dot.className = 'nav-dot';
        if (i === currentQuiz) dot.classList.add('current');
        else if (userAnswers[i] !== null) dot.classList.add('answered');
        else if (visited.has(i)) dot.classList.add('skipped');
    });
    // Update progress bar
    const answered = userAnswers.filter(a => a !== null).length;
    progressBar.style.width = `${(answered / quizData.length) * 100}%`;
}

function goToQuestion(index) {
    // Save current answer first
    const sel = getSelected();
    if (sel !== null) userAnswers[currentQuiz] = sel;
    currentQuiz = index;
    loadQuiz();
    // Close mobile nav
    quizNav.classList.remove('open');
}

// --- Mobile nav toggle ---
navToggle.addEventListener('click', () => {
    quizNav.classList.toggle('open');
});

// --- Countdown ---
function startCountdown() {
    let t = 3;
    countdownEl.innerText = t;
    countdownOverlay.style.display = 'flex';
    const cd = setInterval(() => {
        t--;
        countdownEl.innerText = t;
        if (t <= 0) {
            clearInterval(cd);
            countdownOverlay.style.display = 'none';
            startTimer();
            buildNavigator();
            loadQuiz();
        }
    }, 1000);
}

// --- Load quiz ---
function loadQuiz() {
    visited.add(currentQuiz);
    deselectAnswers();
    const d = quizData[currentQuiz];
    questionEl.innerHTML = `<p id="dont">Question ${currentQuiz + 1} / ${quizData.length}</p>${d.question}`;
    optionA.innerText = d.options[0];
    optionB.innerText = d.options[1];
    optionC.innerText = d.options[2];

    if (userAnswers[currentQuiz] !== null) answerEls[userAnswers[currentQuiz]].checked = true;

    previousBtn.style.display = currentQuiz > 0 ? 'inline-block' : 'none';
    const isLast = currentQuiz === quizData.length - 1;
    nextBtn.style.display = isLast ? 'none' : 'inline-block';
    skipBtn.style.display = isLast ? 'none' : 'inline-block';
    submitBtn.style.display = isLast ? 'inline-block' : 'none';

    updateNavigator();
}

function getSelected() {
    let idx = null;
    answerEls.forEach((el, i) => { if (el.checked) idx = i; });
    return idx;
}

function deselectAnswers() {
    answerEls.forEach(el => { el.checked = false; });
}

function startTimer() {
    clearInterval(timer);
    timer = setInterval(() => {
        time++;
        const h = Math.floor(time / 3600), m = Math.floor((time % 3600) / 60), s = time % 60;
        timeEl.innerText = `${pad(h)}:${pad(m)}:${pad(s)}`;
    }, 1000);
}

function pad(n) { return n < 10 ? `0${n}` : n; }

// --- Navigation ---
nextBtn.addEventListener("click", () => {
    const sel = getSelected();
    if (sel !== null) userAnswers[currentQuiz] = sel;
    // Allow moving forward even without answer (but answer saved if selected)
    if (sel !== null || userAnswers[currentQuiz] !== null) {
        currentQuiz++;
        loadQuiz();
    } else {
        // No answer - don't move, user should use Skip
    }
});

skipBtn.addEventListener("click", () => {
    // Save if they selected something
    const sel = getSelected();
    if (sel !== null) userAnswers[currentQuiz] = sel;
    currentQuiz++;
    loadQuiz();
});

previousBtn.addEventListener("click", () => {
    if (currentQuiz > 0) {
        const sel = getSelected();
        if (sel !== null) userAnswers[currentQuiz] = sel;
        currentQuiz--;
        loadQuiz();
    }
});

// --- Submit with warning ---
submitBtn.addEventListener("click", () => {
    const sel = getSelected();
    if (sel !== null) userAnswers[currentQuiz] = sel;

    const unanswered = userAnswers.filter(a => a === null).length;
    if (unanswered > 0) {
        skipWarningText.textContent = `You have ${unanswered} unanswered question${unanswered > 1 ? 's' : ''}. Submit anyway?`;
        skipWarning.classList.add('active');
    } else {
        handleQuizSubmission();
    }
});

document.getElementById('btnReview').addEventListener('click', () => {
    skipWarning.classList.remove('active');
    // Jump to first unanswered
    const idx = userAnswers.findIndex(a => a === null);
    if (idx !== -1) goToQuestion(idx);
});

document.getElementById('btnSubmitAnyway').addEventListener('click', () => {
    skipWarning.classList.remove('active');
    handleQuizSubmission();
});

// --- Submission ---
function handleQuizSubmission() {
    clearInterval(timer);
    const score = calculateScore();
    const results = generateDetailedResults();
    displayScoreAndResults(score, results);
    setupNavigation();
    saveResultsToFirestore(score, results);
    // Hide navigator
    document.getElementById('quizNav').style.display = 'none';
    navToggle.style.display = 'none';
}

function calculateScore() {
    let s = 0;
    for (let i = 0; i < quizData.length; i++) {
        if (userAnswers[i] !== null && quizData[i].options[userAnswers[i]] === parseInt(quizData[i].answer)) s++;
    }
    return s;
}

function generateDetailedResults() {
    return quizData.map((q, i) => ({
        question: q.question, options: q.options, userAnswer: userAnswers[i],
        correct: userAnswers[i] !== null && q.options[userAnswers[i]] === parseInt(q.answer),
        answer: q.answer
    }));
}

function displayScoreAndResults(score, results) {
    quiz.innerHTML = `
        <div id="score-section">
            <h2 id="result">You answered correctly ${score}/${quizData.length} questions.<br><br>In ${timeEl.innerText}</h2>
            <button id="view-answers-btn" style="padding:10px 20px;margin-top:20px">View Answers</button>
            <button id="home-btn" style="padding:10px 20px;margin-top:20px">Home</button>
        </div>
        <div id="result-section">${generateResultHTML(results)}<button id="back-btn" style="padding:10px 20px;margin-top:20px">Back</button></div>`;
    document.getElementById("result-section").style.display = "none";
}

function setupNavigation() {
    document.getElementById("view-answers-btn").addEventListener("click", () => {
        document.getElementById("score-section").style.display = "none";
        document.getElementById("result-section").style.display = "block";
    });
    document.getElementById("back-btn").addEventListener("click", () => {
        document.getElementById("result-section").style.display = "none";
        document.getElementById("score-section").style.display = "block";
    });
    document.getElementById("home-btn").addEventListener("click", () => { window.location.href = './dashboard.html'; });
}

function saveResultsToFirestore(score, results) {
    const userName = localStorage.getItem('userName');
    if (!userName) return;
    const userDocRef = doc(collection(db, 'scores'), userName);
    const data = { score, maxScore: quizData.length, timestamp: serverTimestamp(), results };
    getDoc(userDocRef).then(snap => {
        (snap.exists() ? updateDoc(userDocRef, {level2: data}) : setDoc(userDocRef, {level2: data}))
        .then(() => console.log('Score saved!')).catch(e => console.error('Save error:', e));
    }).catch(e => console.error('Fetch error:', e));
}

function generateResultHTML(results) {
    return results.map((r, i) => `
        <div style="background:white;color:black;padding:20px">
            <h3>Question ${i + 1}</h3><p>${r.question}</p>
            ${r.options.map((o, idx) => `<button style="background-color:${
                r.userAnswer === idx ? (r.correct ? 'green' : 'red') : 'grey'
            };border-radius:8px;padding:8px 16px;border:none;color:white;font-weight:600;margin:4px">${o}</button>`).join('')}
            <p style="font-size:0.85rem;color:#475569">Correct answer: ${r.answer}</p><hr>
        </div>`).join('');
}

// --- Init ---
window.onload = () => {
    const userName = localStorage.getItem('userName');
    if (userName) {
        const userDocRef = doc(collection(db, 'scores'), userName);
        getDoc(userDocRef).then(snap => {
            if (snap.exists() && snap.data().level2) {
                quiz.classList.add("quiz-attempted");
                quiz.innerHTML = '<h2>You have already completed this quiz.</h2><br><button><a href="./dashboard.html">Home</a></button>';
                countdownOverlay.style.display = 'none';
                document.getElementById('quizNav').style.display = 'none';
                navToggle.style.display = 'none';
            } else { startCountdown(); }
        }).catch(e => console.error('Error:', e));
    } else { startCountdown(); }
};
    </script>
</body>
</html>
