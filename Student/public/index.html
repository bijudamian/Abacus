<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Login</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Animation Keyframes */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body Styling */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            animation: fadeIn 1.5s ease-in;
        }

        /* Container Styling */
        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            animation: slideIn 1s ease-in-out;
        }

        /* Header Styling */
        h1 {
            margin-bottom: 10px;
            font-size: 2.5rem;
            color: #333;
            animation: fadeIn 2s ease-in;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 1.5rem;
            color: #555;
            animation: fadeIn 2.5s ease-in;
        }

        /* Form Styling */
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        label {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 5px;
        }

        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        button {
            background: #427f36;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
            font-size: 1rem;
        }

        button:hover {
            background: #9face6;
            transform: scale(1.05);
        }

        button:focus {
            outline: none;
        }

        #error-message {
            color: red;
            margin-top: 10px;
        }



/* Mobile Specific Styling */
@media (max-width: 600px) {
    body {
        padding: 10px;
    }
    
    /* Container Styling */
.container {
    background: #ffffff;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    text-align: center;
    animation: slideIn 1s ease-in-out;
    max-width: 400px;
    width: 100%;
    margin: 20px;
}

    h1 {
        font-size: 2rem;
    }

    h2 {
        font-size: 1.25rem;
    }

    input[type="email"], input[type="password"] {
        padding: 8px;
        font-size: 0.9rem;
    }

    button {
        padding: 8px 15px;
        font-size: 0.9rem;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <h1><u>Sara Abacus</u></h1>
        <center><h2>Login</h2></center>
        <form id="login-form">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <br>
            <button type="submit">Login</button>
        </form>
        <p id="error-message"></p>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoo1UZt6daTqU1BRmTJoxJN601KNhvf4c",
            authDomain: "abacus-1cd92.firebaseapp.com",
            projectId: "abacus-1cd92",
            storageBucket: "abacus-1cd92.appspot.com",
            messagingSenderId: "52069573106",
            appId: "1:52069573106:web:224d42e32e098446a34b6b",
            measurementId: "G-NCZPLYG1NR"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    localStorage.setItem('user', JSON.stringify(user));
                    window.location.href = 'dashboard.html';
                })
                .catch((error) => {
                    const errorMessage = error.message;
                    document.getElementById('error-message').textContent = errorMessage;
                });
        });
    </script>
</body>
</html>
