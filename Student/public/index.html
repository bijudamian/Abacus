<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sara Abacus — Student Login</title>
    <meta name="description" content="Login to Sara Abacus student portal to access quizzes and track your progress.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2.0">
</head>
<body>
    <div class="container">
        <h1><u>Sara Abacus</u></h1>
        <h2>Student Login</h2>
        <form id="login-form">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@saraabacus.com" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <button type="submit">Sign In</button>
        </form>
        <p id="error-message"></p>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        document.getElementById('login-form').addEventListener('submit', async function(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-message');
            const submitBtn = this.querySelector('button[type="submit"]');
            
            // Clear previous errors
            errorEl.textContent = '';
            submitBtn.textContent = 'Signing in...';
            submitBtn.disabled = true;

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                let msg = 'Login failed. Please try again.';
                if (error.message.includes('Invalid login credentials')) msg = 'Incorrect email or password.';
                else if (error.message.includes('Email not confirmed')) msg = 'Please confirm your email.';
                errorEl.textContent = msg;
                submitBtn.textContent = 'Sign In';
                submitBtn.disabled = false;
            } else {
                localStorage.setItem('user', JSON.stringify(data.user));
                localStorage.setItem('userName', email.split('@')[0]); // For compatibility with older code
                localStorage.setItem('supabaseToken', data.session.access_token);
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
